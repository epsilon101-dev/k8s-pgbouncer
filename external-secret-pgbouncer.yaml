apiVersion: v1
kind: ServiceAccount
metadata:
  name: prod-pgbouncer-sa
  namespace: prod-hades
  annotations:
    iam.gke.io/gcp-service-account: prod-pgbouncer-gsa@your-gcp-project-id.iam.gserviceaccount.com
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-store
  namespace: prod-hades
spec:
  provider:
    gcpsm:
      auth:
        workloadIdentity:
          serviceAccountRef:
            name: prod-pgbouncer-sa
      projectID: your-gcp-project-id
---
# 1. Kubernetes Secret untuk SSL CA Cert
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pgbouncer-certs
  namespace: prod-hades
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: pgbouncer-certs
    creationPolicy: Owner
  data:
    - secretKey: server-ca.crt
      remoteRef:
        key: prod-pgbouncer-secrets
        property: server_ca
---
# 2. Kubernetes Secret untuk userlist.txt
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pgbouncer-secret
  namespace: prod-hades
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: pgbouncer-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        userlist.txt: |
          "prod_backend_hades_user" "{{ .db_password }}"
          "prod_backend_hades_abc" "{{ .db_password }}"
  data:
    - secretKey: db_password
      remoteRef:
        key: prod-pgbouncer-secrets
        property: db_password
---
# 3. Kubernetes Secret untuk pgbouncer.ini
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pgbouncer-config
  namespace: prod-hades
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: pgbouncer-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        pgbouncer.ini: |
          [databases]
          * = host={{ .db_ip }} port=5432

          [pgbouncer]
          logfile =
          pidfile =
          listen_addr = 0.0.0.0
          listen_port = 5432
          unix_socket_dir = /var/run/pgbouncer

          # Auth
          auth_type = scram-sha-256
          auth_file = /etc/pgbouncer-auth/userlist.txt
          admin_users = prod_backend_hades_abc
          stats_users =

          # Pooling
          pool_mode = session
          server_reset_query = DISCARD ALL
          server_reset_query_always = 0
          ignore_startup_parameters = extra_float_digits

          # Connections
          max_client_conn = 1000
          default_pool_size = 40
          reserve_pool_size = 5
          reserve_pool_timeout = 3

          # Timeouts
          server_connect_timeout   = 15
          server_login_retry       = 15
          client_login_timeout     = 10
          query_wait_timeout       = 30
          idle_transaction_timeout = 60
          server_idle_timeout      = 600

          # TLS to CloudSQL
          server_tls_sslmode  = verify-ca
          server_tls_ca_file  = /etc/pgbouncer-certs/server-ca.crt
  data:
    - secretKey: db_ip
      remoteRef:
        key: prod-pgbouncer-secrets
        property: db_ip
