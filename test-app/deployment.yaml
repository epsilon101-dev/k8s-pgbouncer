apiVersion: apps/v1
kind: Deployment
metadata:
  name: gin-client
  namespace: prod-hades
  labels:
    app: gin-client
spec:
  replicas: 1

  selector:
    matchLabels:
      app: gin-client
  template:
    metadata:
      labels:
        app: gin-client
    spec:
      nodeSelector:
        env-pool: production-athena
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - gin-client
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gin-client
          image: asia-southeast2-docker.pkg.dev/flock-348606/athena/staging-athena/gin-pgbouncer-client@sha256:cab0622468c30b3c9b2d981f233645f0cdaa0a04091ed2bd741b9820b9750028

          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: "pgbouncer" # PgBouncer Kubernetes Service name
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "prod_backend_hades_user"
            - name: DB_NAME
              value: "prod_hades_user"
            - name: DB_SSLMODE
              value: "require"

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgbouncer-secret
                  key: db_password_user
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gin-client
  namespace: prod-hades
spec:
  selector:
    app: gin-client
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
