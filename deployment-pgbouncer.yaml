# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pgbouncer-pdb
  namespace: prod-hades
  labels:
    app: pgbouncer
    env: prod
spec:
  minAvailable: 1 # Ensure at least one replica is always available during disruptions
  selector:
    matchLabels:
      app: pgbouncer
      env: prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: prod-hades
spec:
  replicas: 2
  revisionHistoryLimit: 6
  minReadySeconds: 20
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 50%
  selector:
    matchLabels:
      app: pgbouncer
      env: prod
  template:
    metadata:
      labels:
        app: pgbouncer
        env: prod
    spec:
      terminationGracePeriodSeconds: 200
      nodeSelector:
        env-pool: production-pool # replace with gke pool node label
      affinity:
        podAntiAffinity: # Soft rule: spreads replicas across different nodes, but allows running on a single NodePool VM if only one is available
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - pgbouncer
                    - key: env
                      operator: In
                      values:
                        - prod
                topologyKey: kubernetes.io/hostname # Defines the node domain boundary for spreading pods
      securityContext:
        runAsNonRoot: true # Enforce container execution as non-root user
        runAsUser: 70 # Run container process under UID 70 (pgbouncer)
        runAsGroup: 70 # Run container process under GID 70 (pgbouncer)
        fsGroup: 70 # Set GID 70 ownership for all volume mounts
        seccompProfile:
          type: RuntimeDefault # Restrict system calls using container runtime default profile
        appArmorProfile:
          type: RuntimeDefault # Confine container using container runtime default AppArmor profile
      containers:
        - name: pgbouncer
          # Use immutable image digest in production (e.g., pgbouncer@sha256:abc123yourdigest...)
          # to ensure predictability and prevent tag overwriting.
          image: asia-southeast2-docker.pkg.dev/your-gcp-project-id/hades/prod/pgbouncer@sha256:your-pushed-image-sha256-digest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: pgbouncer
          securityContext:
            readOnlyRootFilesystem: true # Block runtime writes to the container's root file system
            allowPrivilegeEscalation: false # Prevent child processes from gaining more privileges than parent
            capabilities:
              drop:
                - ALL # Drop all default Linux capabilities to restrict container OS privileges
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1000Mi"
          startupProbe:
            tcpSocket:
              port: 5432
            periodSeconds: 5
            failureThreshold: 12 # Up to 60s for startup
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 8
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            tcpSocket:
              port: 5432
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 5
          lifecycle: # zero-downtime GKE endpoint propagation sleep
            preStop:
              exec:
                command: ["/bin/sleep", "180"]
          volumeMounts:
            - name: config-volume
              mountPath: /etc/pgbouncer
              readOnly: true
            - name: secret-volume
              mountPath: /etc/pgbouncer-auth
              readOnly: true
            - name: certs-volume
              mountPath: /etc/pgbouncer-certs
              readOnly: true
            - name: pgbouncer-run
              mountPath: /var/run/pgbouncer
      volumes:
        - name: config-volume
          configMap:
            name: pgbouncer-config
        - name: secret-volume
          secret:
            secretName: pgbouncer-secret
        - name: certs-volume
          secret:
            secretName: pgbouncer-certs
        - name: pgbouncer-run
          emptyDir: {}
---
# service
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: prod-hades
  labels:
    app: pgbouncer
    env: prod
spec:
  selector:
    app: pgbouncer
    env: prod
  ports:
    - port: 5432
      protocol: TCP
      targetPort: 5432
  type: ClusterIP
